<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Complaints — ComplainHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body class="inner-page">
  <nav class="navbar">
    <a href="/" class="logo">Complain<span>Hub</span></a>
    <div class="nav-links">
      <span id="navUser" class="nav-user hidden"></span>
      <a href="/pages/login.html" class="btn-nav" id="navLogin">Login</a>
      <a href="/pages/add-complaint.html" class="btn-nav btn-accent" id="navAdd" style="display:none">+ File Complaint</a>
      <button class="btn-nav btn-outline" id="navLogout" style="display:none" onclick="logout()">Logout</button>
    </div>
  </nav>

  <main class="list-page">
    <div class="page-header">
      <div>
        <h1>All Complaints</h1>
        <p id="totalCount" class="subtitle"></p>
      </div>
      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterComplaints('all', this)">All</button>
        <button class="filter-btn" onclick="filterComplaints('Pending', this)">Pending</button>
        <button class="filter-btn" onclick="filterComplaints('In Review', this)">In Review</button>
        <button class="filter-btn" onclick="filterComplaints('Resolved', this)">Resolved</button>
      </div>
    </div>

    <div id="loadingState" class="loading-state">
      <div class="spinner"></div>
      <p>Loading complaints...</p>
    </div>

    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">📭</div>
      <h3>No complaints found</h3>
      <p>No complaints match the selected filter.</p>
    </div>

    <div id="complaintsList" class="complaints-grid hidden"></div>
  </main>

  <div class="modal hidden" id="imageModal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <img id="modalImg" src="" alt="Complaint image" />
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const user = getUser();
    if (user) {
      document.getElementById("navUser").textContent = `Hi, ${user.name}`;
      document.getElementById("navUser").classList.remove("hidden");
      document.getElementById("navLogin").style.display = "none";
      document.getElementById("navLogout").style.display = "inline-block";
      document.getElementById("navAdd").style.display = "inline-block";
    }

    let allComplaints = [];

    async function loadComplaints() {
      try {
        const res = await fetch("/api/complaints");
        allComplaints = await res.json();
        renderComplaints(allComplaints);
        document.getElementById("loadingState").classList.add("hidden");
      } catch {
        document.getElementById("loadingState").innerHTML = '<p class="error-text">Failed to load complaints.</p>';
      }
    }

    function filterComplaints(status, btn) {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const filtered = status === "all" ? allComplaints : allComplaints.filter(c => c.status === status);
      renderComplaints(filtered);
    }

    function renderComplaints(list) {
      const container = document.getElementById("complaintsList");
      const empty = document.getElementById("emptyState");
      document.getElementById("totalCount").textContent = `${allComplaints.length} complaint${allComplaints.length !== 1 ? "s" : ""} filed`;

      if (!list.length) {
        container.classList.add("hidden");
        empty.classList.remove("hidden");
        return;
      }

      empty.classList.add("hidden");
      container.classList.remove("hidden");

      container.innerHTML = list.map(c => `
        <div class="complaint-card" id="card-${c._id}">
          ${c.image ? `
            <div class="card-image" onclick="openModal('/uploads/${c.image}')">
              <img src="/uploads/${c.image}" alt="Complaint image" loading="lazy" />
              <div class="img-overlay">🔍 View</div>
            </div>` : ""}
          <div class="card-body">
            <div class="card-meta">
              <span class="status-badge status-${c.status.toLowerCase().replace(" ", "-")}">${c.status}</span>
              <span class="card-date">${formatDate(c.createdAt)}</span>
            </div>
            <h3 class="card-title">${escapeHtml(c.title)}</h3>
            <p class="card-desc">${escapeHtml(c.description)}</p>
            <div class="card-footer">
              <span class="card-author">by ${escapeHtml(c.userName || "Anonymous")}</span>
              ${user && c.user === user.id ? `
                <div class="card-actions">
                  <select class="status-select" onchange="updateStatus('${c._id}', this.value)">
                    <option ${c.status === "Pending" ? "selected" : ""}>Pending</option>
                    <option ${c.status === "In Review" ? "selected" : ""}>In Review</option>
                    <option ${c.status === "Resolved" ? "selected" : ""}>Resolved</option>
                  </select>
                  <button class="btn-delete" onclick="deleteComplaint('${c._id}')">Delete</button>
                </div>` : ""}
            </div>
          </div>
        </div>
      `).join("");
    }

    async function updateStatus(id, status) {
      try {
        const res = await fetch(`/api/complaints/${id}/status`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${getToken()}` },
          body: JSON.stringify({ status }),
        });
        if (res.ok) {
          const updated = await res.json();
          allComplaints = allComplaints.map(c => c._id === id ? { ...c, status: updated.status } : c);
          const badge = document.querySelector(`#card-${id} .status-badge`);
          if (badge) {
            badge.textContent = updated.status;
            badge.className = `status-badge status-${updated.status.toLowerCase().replace(" ", "-")}`;
          }
        }
      } catch { alert("Failed to update status."); }
    }

    async function deleteComplaint(id) {
      if (!confirm("Are you sure you want to delete this complaint?")) return;
      try {
        const res = await fetch(`/api/complaints/${id}`, {
          method: "DELETE",
          headers: { Authorization: `Bearer ${getToken()}` },
        });
        if (res.ok) {
          allComplaints = allComplaints.filter(c => c._id !== id);
          renderComplaints(allComplaints);
        }
      } catch { alert("Failed to delete."); }
    }

    function openModal(src) {
      document.getElementById("modalImg").src = src;
      document.getElementById("imageModal").classList.remove("hidden");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      document.getElementById("imageModal").classList.add("hidden");
      document.body.style.overflow = "";
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
    }

    function escapeHtml(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    loadComplaints();
  </script>
</body>
</html>
