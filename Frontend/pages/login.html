<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ComplainHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body class="auth-page">
  <nav class="navbar">
    <a href="/" class="logo">Complain<span>Hub</span></a>
  </nav>

  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Welcome back</h2>
        <p>Sign in to your account</p>
      </div>

      <div id="errorMsg" class="alert alert-error hidden"></div>
      <div id="successMsg" class="alert alert-success hidden"></div>

      <div class="auth-tabs">
        <button class="tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
        <button class="tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <div id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" />
        </div>
        <button class="btn-primary full-width" onclick="handleLogin()">Sign In</button>
      </div>

      <div id="signupForm" class="hidden">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="John Doe" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Min. 6 characters" />
        </div>
        <button class="btn-primary full-width" onclick="handleSignup()">Create Account</button>
      </div>
    </div>
  </main>

  <div class="shape s1"></div>
  <div class="shape s2"></div>

  <script src="/js/auth.js"></script>
  <script>
    if (getToken()) window.location.href = "/";

    function switchTab(tab) {
      document.getElementById("loginForm").classList.toggle("hidden", tab !== "login");
      document.getElementById("signupForm").classList.toggle("hidden", tab !== "signup");
      document.getElementById("tabLogin").classList.toggle("active", tab === "login");
      document.getElementById("tabSignup").classList.toggle("active", tab === "signup");
      clearMessages();
    }

    function showError(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent = msg;
      el.classList.remove("hidden");
      document.getElementById("successMsg").classList.add("hidden");
    }

    function showSuccess(msg) {
      const el = document.getElementById("successMsg");
      el.textContent = msg;
      el.classList.remove("hidden");
      document.getElementById("errorMsg").classList.add("hidden");
    }

    function clearMessages() {
      document.getElementById("errorMsg").classList.add("hidden");
      document.getElementById("successMsg").classList.add("hidden");
    }

    async function handleLogin() {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      if (!email || !password) return showError("Please fill all fields.");
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) return showError(data.message);
        saveAuth(data.token, data.user);
        showSuccess("Login successful! Redirecting...");
        setTimeout(() => window.location.href = "/", 800);
      } catch {
        showError("Network error. Please try again.");
      }
    }

    async function handleSignup() {
      const name = document.getElementById("signupName").value.trim();
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value;
      if (!name || !email || !password) return showError("Please fill all fields.");
      try {
        const res = await fetch("/api/auth/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await res.json();
        if (!res.ok) return showError(data.message);
        saveAuth(data.token, data.user);
        showSuccess("Account created! Redirecting...");
        setTimeout(() => window.location.href = "/", 800);
      } catch {
        showError("Network error. Please try again.");
      }
    }
  </script>
</body>
</html>
